name: Build Android APK (FINAL SCENE)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    name: Export Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Java (buat keytool & signing APK)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate debug keystore
        run: |
          keytool -keyalg RSA -genkeypair -alias androiddebugkey \
            -keypass android -keystore /home/runner/debug.keystore \
            -storepass android -dname "CN=Android Debug,O=Android,C=US" \
            -validity 9999 -deststoretype pkcs12

      - name: Export Android build (Godot 4.3)
        uses: firebelley/godot-export@v8.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-build
          path: ~/.local/share/godot/export_output/**/*
          if-no-files-found: error
